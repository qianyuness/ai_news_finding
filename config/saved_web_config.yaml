runtime:
  output_dir: output
  log_dir: logs
  temp_dir: output/.tmp
  request_timeout_seconds: 20
  image_download_timeout_seconds: 20
  retries: 3
  max_workers: 10
  article_limit_per_source: 50
  max_articles_for_analysis: 200
  min_items_for_section_analysis: 3
  max_items_per_section: 5
  recent_hours: 24
  start_date: null
  end_date: null
  keep_temp_images: false
  document_name_template: 每日AI资讯_{timestamp}.docx
  filename_time_format: '%Y%m%d_%H%M'
  user_agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML,
    like Gecko) Chrome/134.0 Safari/537.36
schedule:
  daily_time: 09:00
summary:
  min_chars: 30
  max_chars: 50
quality:
  min_score: 10
llm:
  enabled: true
  provider: openai_compatible
  model: ''
  model_env: LLM_MODEL
  api_key_env: LLM_API_KEY
  base_url_env: LLM_BASE_URL
  api_url_env: LLM_API_URL
  temperature: 0.2
  top_p: 0.8
  max_tokens: 2048
  timeout_seconds: 120
  max_retries: 6
  requests_per_minute: 12
  max_workers: 2
  max_concurrency: 2
document:
  title: 每日AI资讯摘编
  subtitle_prefix: 内部参考
  title_font: 方正小标宋_GBK
  heading_font: 黑体
  body_font: 仿宋_GB2312
  emphasis_font: 楷体_GB2312
  title_size_pt: 22
  heading_size_pt: 16
  body_size_pt: 14
  caption_size_pt: 11
  line_spacing_pt: 28
  image_width_inches: 5.8
  include_url: true
  sections:
  - key: ai_application
    label: 一、AI应用
  - key: ai_model
    label: 二、AI模型
  - key: ai_safety
    label: 三、AI安全
  - key: ai_investment
    label: 四、AI投融资
  - key: research_paper
    label: 五、最新研究论文
filtering:
  include_keywords:
  - AI
  - 人工智能
  - 大模型
  - 生成式AI
  - 机器学习
  - 多模态
  - 智能体
  - Agent
  - LLM
  - GPT
  - Claude
  - Gemini
  - Qwen
  - DeepSeek
  - inference
  - reasoning
  - open source model
  - foundation model
  - machine learning
  - artificial intelligence
  exclude_keywords:
  - 招聘
  - 课程
  - 培训
  - 广告
  - 软文
  - 直播报名
  - 活动回顾
  - 报名入口
  - 促销
  - 自媒体运营
  - 带货
  - 返佣
  - 加群
  - 微信咨询
  - 股票荐股
  - 娱乐八卦
